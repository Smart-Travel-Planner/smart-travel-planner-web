
<main class="relative min-h-screen w-full flex items-center justify-center px-6 py-12 overflow-hidden">

  <div
    aria-hidden="true"
    class="fixed inset-0 z-0 bg-cover bg-center"
    style="background-image: url('https://res.cloudinary.com/dux4gqdow/image/upload/v1773662802/pietro-de-grandi-T7K4aEPoGGk-unsplash_nqzjxq.jpg')">
    <div class="absolute inset-0 bg-linear-to-b from-slate-950/80 via-slate-900/60 to-slate-950/90"></div>
  </div>

  <div class="relative z-10 w-full max-w-md flex flex-col gap-6">

    <div class="bg-black/30 backdrop-blur-sm px-4 py-3 rounded-2xl text-center">
      <h1 class="text-3xl font-extrabold tracking-tight text-white drop-shadow-lg">
        Smart Travel <span class="text-blue-400">Planner</span>
      </h1>
      <p class="text-slate-300 mt-1 text-sm">Accede a tu cuenta para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="bg-sky-50 rounded-3xl border border-slate-100 p-8 flex flex-col gap-6 shadow-2xl">

      <div class="flex flex-col gap-1.5">
        <label for="email" class="text-xs uppercase tracking-wider text-slate-600 font-bold ml-1">Correo electrónico</label>
        <div class="relative">
          <mat-icon aria-hidden="true" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">mail</mat-icon>
          <input
            id="email"
            formControlName="email"
            type="email"
            aria-required="true"
            placeholder="tucorreo@ejemplo.com"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-950 focus:outline-none focus:border-blue-500 transition-all shadow-inner"/>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-xs uppercase tracking-wider text-slate-600 font-bold ml-1">Contraseña</label>
        <div class="relative">
          <mat-icon aria-hidden="true" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">key</mat-icon>
          <input
            id="password"
            formControlName="password"
            type="password"
            aria-required="true"
            placeholder="••••••••"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-950 focus:outline-none focus:border-blue-500 transition-all shadow-inner"/>
        </div>
      </div>

      @if (errorMessage) {
        <div role="alert" class="p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-600 text-xs text-center">
          {{ errorMessage }}
        </div>
      }

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="flex items-center justify-center gap-2 w-full px-8 py-3 rounded-xl text-base font-bold transition-all shadow-lg
               bg-blue-600 text-white hover:bg-blue-700 hover:scale-105
               disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:bg-slate-500">
        @if (isLoading) {
          <mat-icon aria-hidden="true" class="animate-spin text-lg">progress_activity</mat-icon>
          Conectando...
        } @else {
          <mat-icon aria-hidden="true" class="text-lg">login</mat-icon>
          Entrar
        }
      </button>
    </form>

    <div class="text-center">
      <a routerLink="/register" class="text-slate-300 hover:text-blue-400 text-sm transition-colors">
        ¿No tienes cuenta? <span class="text-blue-400 font-semibold underline underline-offset-4 decoration-blue-400/30">Regístrate gratis</span>
      </a>
    </div>
  </div>
</main>
