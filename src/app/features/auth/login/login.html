
<main class="min-h-screen w-full bg-linear-to-b from-slate-900 via-slate-800 to-black flex items-center justify-center px-6">

  <div class="w-full max-w-md bg-white/5 backdrop-blur-2xl border border-white/10 rounded-4xl p-10 shadow-2xl">

    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 border border-blue-500/20 mb-4">
        <span class="material-symbols-outlined text-blue-400 text-3xl"><mat-icon>lock_open</mat-icon></span>
      </div>
      <h2 class="text-white text-3xl font-bold tracking-tight">Bienvenido</h2>
      <p class="text-slate-400 mt-2">Accede a tu Smart Travel Planner</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl"><mat-icon>mail</mat-icon></span>
        <input
          formControlName="email"
          type="email"
          placeholder="Correo electrónico"
          class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-hidden focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all outline-hidden"
        />
      </div>

      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl"><mat-icon>key</mat-icon></span>
        <input
          formControlName="password"
          type="password"
          placeholder="Contraseña"
          class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-hidden focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all outline-hidden"
        />
      </div>

      @if (errorMessage) {
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm py-3 px-4 rounded-xl text-center">
          {{ errorMessage }}
        </div>
      }

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full mt-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
        @if (isLoading) {
          <span class="flex items-center justify-center gap-2">
            <span class="material-symbols-outlined animate-spin text-xl"><mat-icon>progress_activity</mat-icon></span>
            Conectando con el servidor...
          </span>
        } @else {
        Entrar
        }
      </button>
    </form>

    <div class="mt-8 text-center">
      <a routerLink="/register" class="text-slate-400 hover:text-blue-400 text-sm transition-colors decoration-blue-400/30 underline-offset-4 hover:underline">
        ¿No tienes cuenta? <span class="text-blue-400 font-semibold">Regístrate gratis</span>
      </a>
    </div>

  </div>
</main>
