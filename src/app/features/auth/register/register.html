
<main class="min-h-screen w-full bg-linear-to-b from-slate-900 via-slate-800 to-black flex items-center justify-center px-6 py-12">

  <div class="w-full max-w-md bg-white/5 backdrop-blur-2xl border border-white/10 rounded-4xl p-10 shadow-2xl">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 border border-blue-500/20 mb-4">
        <span class="material-symbols-outlined text-blue-400 text-3xl">person_add</span>
      </div>
      <h2 class="text-white text-3xl font-bold tracking-tight">Crea tu cuenta</h2>
      <p class="text-slate-400 mt-2">Empieza a planificar tu próxima aventura</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">badge</span>
        <input
          formControlName="name"
          type="text"
          placeholder="Nombre completo"
          class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-hidden focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all outline-hidden"
        />
      </div>

      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
        <input
          formControlName="email"
          type="email"
          placeholder="Correo electrónico"
          class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-hidden focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all outline-hidden"
        />
      </div>

      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
        <input
          formControlName="password"
          type="password"
          placeholder="Contraseña"
          class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-hidden focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all outline-hidden"
        />
      </div>

      @if (errorMessage) {
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm py-3 px-4 rounded-xl text-center animate-pulse">
          {{ errorMessage }}
        </div>
      }

      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full mt-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
        Registrarse
      </button>
    </form>

    <div class="mt-8 text-center border-t border-white/10 pt-6">
      <a routerLink="/login" class="text-slate-400 hover:text-blue-400 text-sm transition-colors">
        ¿Ya tienes cuenta? <span class="text-blue-400 font-semibold underline underline-offset-4 decoration-blue-400/30">Inicia sesión</span>
      </a>
    </div>

  </div>
</main>
