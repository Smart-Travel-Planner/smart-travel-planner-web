<main class="min-h-screen w-full bg-linear-to-b from-slate-900 via-slate-800 to-black text-white px-6 py-12 flex flex-col items-center">

  <header class="w-full max-w-4xl flex justify-between items-end mb-12">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight">
        Mis <span class="text-blue-400">Viajes</span>
      </h1>
      <p class="text-slate-400 mt-1 text-sm">Gestiona tus próximas aventuras</p>
    </div>

    <button
      (click)="goToCreate()"
      class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 transition-colors px-5 py-2.5 rounded-xl font-medium shadow-lg shadow-blue-900/20">
      <span class="material-symbols-outlined text-sm">add</span>
      Nuevo viaje
    </button>
  </header>

  <section class="w-full max-w-4xl bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 mb-8 flex flex-wrap gap-6 items-center justify-between">

    <div class="flex bg-black/20 p-1 rounded-xl border border-white/5">
      <button
        (click)="setFilter('all')"
        class="px-4 py-2 rounded-lg text-sm transition-all"
        >
        Todos
      </button>
      <button (click)="setFilter('mine')" class="px-4 py-2 rounded-lg text-sm hover:bg-white/5 transition-all">Mis viajes</button>
      <button (click)="setFilter('public')" class="px-4 py-2 rounded-lg text-sm hover:bg-white/5 transition-all">Públicos</button>
    </div>

    <div class="flex flex-wrap gap-4 items-center">
      <div class="flex flex-col gap-1">
        <label class="text-[10px] uppercase tracking-wider text-slate-400 ml-1">Desde</label>
        <input
          type="date"
          (change)="setDateFrom($any($event.target).value)"
          class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-sm focus:outline-hidden focus:border-blue-400 transition-colors"/>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[10px] uppercase tracking-wider text-slate-400 ml-1">Hasta</label>
        <input
          type="date"
          (change)="setDateTo($any($event.target).value)"
          class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-sm focus:outline-hidden focus:border-blue-400 transition-colors"/>
      </div>
    </div>
  </section>

  @if (errorMessage()) {
    <div class="w-full max-w-4xl p-4 mb-6 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-center">
      {{ errorMessage() }}
    </div>
  }

  <section class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-4">
    @for (trip of filteredTrips(); track trip.id) {
      <article class="group relative overflow-hidden bg-white/5 backdrop-blur-md border border-white/10 p-5 rounded-3xl hover:border-blue-400/50 transition-all duration-300">
        <div class="flex justify-between items-start mb-4">
          <div class="flex flex-col">
            <h3 class="text-xl font-bold group-hover:text-blue-400 transition-colors">{{ trip.title }}</h3>
            <span class="text-slate-400 text-sm flex items-center gap-1 mt-1">
              <span class="material-symbols-outlined text-sm text-blue-400">calendar_today</span>
              {{ trip.start_date }}
            </span>
          </div>
          <div class="w-10 h-10 rounded-full bg-blue-400/10 flex items-center justify-center text-blue-400">
            <span class="material-symbols-outlined">flight_takeoff</span>
          </div>
        </div>

        <button
          (click)="goToDetail(trip.id)"
          class="w-full mt-2 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-sm font-medium transition-all">
          Ver detalle del viaje
        </button>
      </article>
    }
  </section>
</main>
