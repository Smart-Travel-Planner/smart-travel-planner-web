<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
</style>

<main class="min-h-screen w-full bg-linear-to-b from-slate-900 via-slate-800 to-blue-600 text-white flex flex-col items-center pb-16">

  <!-- CABECERA -->
  <div
    class="relative w-full min-h-64 flex flex-col items-center pt-16 px-6 overflow-hidden bg-cover bg-center"
    style="background-image: url('https://res.cloudinary.com/dux4gqdow/image/upload/v1773662802/pietro-de-grandi-T7K4aEPoGGk-unsplash_nqzjxq.jpg')">

    <div class="absolute inset-0 bg-linear-to-t from-slate-950 via-slate-900/40 to-transparent"></div>

    <div class="relative w-full max-w-4xl mx-auto pb-4 flex justify-between items-end z-10">
      <div class="bg-black/30 backdrop-blur-sm px-4 py-2 rounded-2xl">
        <h1 class="text-xl md:text-3xl font-extrabold tracking-tight drop-shadow-md" style="font-family: 'Pacifico', cursive;">
          {{ isEditMode() ? 'Editar' : 'Nuevo' }} <span class="text-blue-400">Viaje</span>
        </h1>
        <p class="text-slate-200 mt-3 text-sm font-medium">
          {{ isEditMode() ? 'Modifica los datos de tu viaje' : 'Planifica tu próxima aventura' }}
        </p>
      </div>
    </div>
  </div>

  <!-- FORMULARIO -->
  <form
    [formGroup]="tripForm"
    (ngSubmit)="onSubmit()"
    class="w-full max-w-4xl px-4 mt-8 flex flex-col gap-6">

    <section class="bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800 p-6 flex flex-col gap-5">

      <!-- Título -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400">Título</label>
        <input
          type="text"
          formControlName="title"
          placeholder="Viaje a Japón"
          class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:border-blue-400 transition-colors"/>
      </div>

      <!-- Destino -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400">Destino</label>
        <input
          type="text"
          formControlName="destination"
          placeholder="Tokio"
          class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:border-blue-400 transition-colors"/>
      </div>

      <!-- Fechas -->
      <div class="flex flex-col sm:flex-row gap-4">
        <div class="flex flex-col gap-1 flex-1">
          <label class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400">Fecha de inicio</label>
          <input
            type="datetime-local"
            formControlName="start_date"
            class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:border-blue-400 transition-colors"/>
        </div>
        <div class="flex flex-col gap-1 flex-1">
          <label class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400">Fecha final</label>
          <input
            type="datetime-local"
            formControlName="end_date"
            class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:border-blue-400 transition-colors"/>
        </div>
      </div>

      <!-- Presupuesto -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400">Presupuesto total (€)</label>
        <input
          type="number"
          formControlName="total_budget"
          placeholder="5000"
          class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:border-blue-400 transition-colors"/>
      </div>

      <!-- URL imagen -->
      <div class="flex flex-col gap-1">
        <label class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400">URL imagen</label>
        <input
          type="text"
          formControlName="image_url"
          placeholder="URL de la imagen"
          class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:border-blue-400 transition-colors"/>
      </div>

      <!-- Viaje público -->
      <label class="flex items-center gap-3 cursor-pointer">
        <input
          type="checkbox"
          formControlName="is_public"
          class="w-4 h-4 rounded border-slate-300 text-blue-500 focus:ring-blue-400"/>
        <span class="text-sm text-slate-700 dark:text-slate-300">Viaje público</span>
      </label>

    </section>

    <!-- Error -->
    @if (errorMessage()) {
      <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-center text-sm">
        {{ errorMessage() }}
      </div>
    }

    <!-- Acciones -->
    <section class="flex items-center justify-between gap-3 mb-4">
      <button
        type="button"
        (click)="goBack()"
        class="px-3 py-1.5 rounded-lg text-sm border border-slate-300 text-slate-300
               hover:bg-white/10 transition-colors">
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="tripForm.invalid"
        class="px-5 py-1.5 rounded-lg text-sm font-semibold border border-blue-400 text-blue-400
               hover:bg-blue-400 hover:text-white transition-colors
               disabled:opacity-40 disabled:cursor-not-allowed">
        {{ isEditMode() ? 'Guardar cambios' : 'Crear viaje' }}
      </button>
    </section>

  </form>

</main>
