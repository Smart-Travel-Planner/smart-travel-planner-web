
<main class="relative h-full w-full flex flex-col items-center justify-end overflow-hidden">

  <div class="absolute inset-0 z-0">
    @for (slide of slides(); track $index) {
      <div
        class="absolute inset-0 bg-cover bg-center transition-opacity duration-1000 ease-in-out"
        [style.backgroundImage]="'url(' + slide.url + ')'"
        [class.opacity-100]="$index === currentIndex()"
        [class.opacity-0]="$index !== currentIndex()">

        <div class="absolute inset-0 bg-linear-to-b from-black/40 via-black/50 to-black/90"></div>
      </div>
    }
  </div>

  <div class="relative z-10 w-full max-w-md px-8 pb-16 text-center flex flex-col items-center">
    <div aria-hidden="true" class="mb-8 flex items-center justify-center w-20 h-20 rounded-3xl bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl">
      <span class="material-symbols-outlined text-white text-5xl">travel_explore</span>
    </div>

    <div class="mb-12">
      <h1 class="text-white text-4xl sm:text-5xl font-extrabold tracking-tight leading-tight mb-4">
        Smart Travel <br/>
        <span class="text-blue-400">Planner</span>
      </h1>
      <p class="text-slate-200 text-lg">Tu viaje, perfectamene planificado.</p>
    </div>

    <div class="flex gap-2 mt-8">
      @for (slide of slides(); track $index) {
        <button
          (click)="goToSlide($index)"
          class="h-2 rounded-full transition-all duration-300"
          [class.bg-white]="$index === currentIndex()"
          [class.w-6]="$index === currentIndex()"
          [class.w-2]="$index !== currentIndex()"
          [class.bg-white/40]="$index !== currentIndex()">
        </button>
      }
    </div>
  </div>
</main>
