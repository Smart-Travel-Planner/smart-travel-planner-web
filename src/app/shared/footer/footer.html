<footer class="w-full py-4 bg-white/90">

  <div class="container mx-auto px-6 flex flex-col items-center">
    @if (isHome()) {
      <p aria-label="Joined by over ten thousand travelers"
         class="text-blue-950 text-[10px] md:text-xs font-bold uppercase tracking-[0.3em] text-center drop-shadow-sm">
        Joined by 10k+ travelers
      </p>
    } @else {
      <p aria-label="Copywright 2026 Smart Travel Planner"
         class="text-blue-950 text-[10px] md:text-xs font-bold uppercase tracking-[0.3em] text-center drop-shadow-sm">
        2026 Smart Travel Planner
      </p>
    }
  </div>
</footer>
